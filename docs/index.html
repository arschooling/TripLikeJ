<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="여행"/>
<meta name="theme-color" content="#F5F2EC"/>
<link rel="manifest" href="manifest.json"/>
<title>뉴욕 여행 · NYC Trip</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  html, body { margin: 0; padding: 0; background: #F5F2EC; overflow-x: hidden; }
  #root { min-height: 100%; background: #F5F2EC; }
  @keyframes ptr-spin { to { transform: rotate(360deg); } }
  #splash {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at 40% 40%, #0a0a1a 0%, #000005 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 32px; z-index: 9999;
    font-family: -apple-system, sans-serif;
    overflow: hidden;
  }

  /* 별 배경 */
  #splash::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.8) 0%, transparent 100%),
      radial-gradient(1px 1px at 25% 60%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 50% 20%, rgba(255,255,255,0.9) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 75%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 35%, rgba(255,255,255,0.7) 0%, transparent 100%),
      radial-gradient(1px 1px at 33% 88%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 90% 10%, rgba(255,255,255,0.8) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 50%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 15% 80%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 78% 55%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 42% 42%, rgba(255,255,255,0.7) 0%, transparent 100%),
      radial-gradient(1px 1px at 5% 45%, rgba(255,255,255,0.4) 0%, transparent 100%);
  }

  /* 물방울 */
  .drop {
    position: relative;
    width: 90px; height: 90px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 32%,
      rgba(255,255,255,0.95) 0%,
      rgba(160,220,255,0.85) 18%,
      rgba(80,170,230,0.7) 40%,
      rgba(30,100,180,0.5) 70%,
      rgba(10,40,100,0.3) 100%
    );
    box-shadow:
      inset -8px -8px 20px rgba(0,60,140,0.4),
      inset 6px 6px 14px rgba(255,255,255,0.5),
      0 0 40px rgba(100,180,255,0.35),
      0 0 80px rgba(60,140,230,0.15);
    animation: dropFloat 4s ease-in-out infinite;
  }

  /* 하이라이트 */
  .drop::before {
    content: '';
    position: absolute;
    top: 14%; left: 20%;
    width: 28%; height: 18%;
    background: rgba(255,255,255,0.9);
    border-radius: 50%;
    filter: blur(4px);
    transform: rotate(-30deg);
  }

  /* 작은 위성 물방울 */
  .drop::after {
    content: '';
    position: absolute;
    top: -18px; right: -10px;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%,
      rgba(255,255,255,0.9),
      rgba(120,200,255,0.7) 40%,
      rgba(40,120,200,0.4)
    );
    box-shadow: 0 0 12px rgba(100,180,255,0.4);
    animation: dropFloat 4s ease-in-out infinite reverse;
  }

  #splash-title {
    font-size: 28px; color: rgba(255,255,255,0.92); letter-spacing: 1px;
    font-family: 'Instrument Serif', Georgia, serif;
    text-shadow: 0 0 20px rgba(120,200,255,0.4);
    animation: titlePulse 4s ease-in-out infinite;
  }

  @keyframes dropFloat {
    0%   { transform: translateY(0px) rotate(0deg) scale(1); }
    25%  { transform: translateY(-14px) rotate(3deg) scale(1.03); }
    50%  { transform: translateY(-6px) rotate(-2deg) scale(0.97); }
    75%  { transform: translateY(-18px) rotate(1deg) scale(1.02); }
    100% { transform: translateY(0px) rotate(0deg) scale(1); }
  }

  @keyframes titlePulse {
    0%, 100% { opacity: 0.85; }
    50%       { opacity: 1; }
  }
</style>
</head>
<body>
<div id="splash">
  <div class="drop"></div>
  <div id="splash-title">Trip Like J</div>
</div>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="data.js"></script>
<script src="firebase.js"></script>
<script src="ios-frame.js"></script>
<script src="dnd-hotel.js"></script>
<script src="app.js"></script>
</body>
</html>
